name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # The IP-safety scan must always run, on every PR, regardless of any other
  # job's success — it is the single most important guardrail we have.
  ip-safety:
    name: IP-safety scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run check_no_rom.sh
        run: ./tools/check_no_rom.sh

  python-tooling:
    name: Tooling smoke test
    runs-on: ubuntu-latest
    needs: ip-safety
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt
      - name: progress.py runs without a build
        # With no asm/ or build/ contents, this should report all zeros.
        run: |
          python tools/progress.py | tee progress.out
          grep -q "matched=0B" progress.out
      - name: verify_rom.py refuses missing ROM
        run: |
          set +e
          python tools/verify_rom.py \
            --rom does-not-exist.z64 \
            --version us \
            --sha1sums config/sha1sums.txt
          rc=$?
          set -e
          test "$rc" = "2"

  # The matching-build job is gated on a maintainer-supplied baserom that
  # is NOT stored in the repo. It is a self-hosted-runner-only job, set up
  # later. Public PR runs see only ip-safety + python-tooling.
  matching-build:
    name: Matching build (self-hosted, opt-in)
    if: ${{ github.repository_owner != '' && false }}  # disabled until configured
    runs-on: self-hosted
    needs: ip-safety
    steps:
      - uses: actions/checkout@v4
      - run: ./tools/setup.sh
      - run: make
