# =============================================================================
# splat configuration — Pokémon Snap (US 1.0)
#
# This is a SKELETON. It declares the structure splat needs but contains
# NO ROM-specific offsets, addresses, segment lists, or symbols. Filling
# those in is part of the decompilation work — they must be derived by
# contributors from a clean inspection of their own legally-obtained ROM.
#
# Any commit that adds offsets here should be accompanied by a note on how
# they were determined (e.g. "header parse + visual inspection of crc/entry"),
# and must not be copied from leaked materials or other unauthorized sources.
#
# Reference for splat YAML schema: https://github.com/ethteck/splat/wiki
# =============================================================================

name: pokemonsnap
sha1: edc7c49cc568c045fe48be0d18011c30f393cbaf
options:
  platform: n64
  basename: pokemonsnap.us
  base_path: ..                   # config/ -> project root
  build_path: build
  asset_path: assets
  asm_path: asm
  src_path: src
  cache_path: build/.splat_cache
  symbol_addrs_path:
    - config/symbol_addrs.us.txt  # see file header for policy
  undefined_funcs_auto_path: config/undefined_funcs_auto.us.txt
  undefined_syms_auto_path:  config/undefined_syms_auto.us.txt
  ld_script_path: config/pokemonsnap.us.ld
  find_file_boundaries: true
  o_as_suffix: true
  use_legacy_include_asm: false
  asm_jtbl_label_macro: jlabel
  asm_data_macro: dlabel
  mnemonic_ljust: 12
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

# ---------------------------------------------------------------------------
# Segments
# ---------------------------------------------------------------------------
# Intentionally empty. Populating this list is the first decompilation
# milestone (see docs/PROGRESS.md). At minimum it will need:
#
#   - the ROM header segment
#   - the IPL3 boot segment (treated as raw bin; not decompiled)
#   - the main code segment
#   - any overlay segments the engine loads dynamically
#   - data and rodata regions
#   - asset segments (audio bank, sequences, textures, etc.) treated as
#     opaque bin and round-tripped without interpretation initially
#
# When you add a segment, the build will start producing real asm under
# asm/ for that range; nothing under asm/ is committed to the repo.
#
# Initial split (minimal):
#
#   - header (0x0..0x40)         standard N64 ROM header, opaque bin
#   - boot   (0x40..0x1000)      IPL3 bootloader, opaque bin (CIC-specific,
#                                round-tripped without interpretation)
#   - main   (0x1000..end)       game code+data, vram derived from the
#                                entry-point field of the user's ROM header
#
# The entry-point address (0x80100400) is a 32-bit configuration value, not
# game content. The 'main' segment is intentionally left as one large code
# region for now; splat's find_file_boundaries will discover natural splits,
# and contributors will refine into per-overlay subsegments over time.
# ---------------------------------------------------------------------------
segments:
  - name: header
    type: header
    start: 0x0

  - name: boot
    type: bin
    start: 0x40

  - name: main
    type: code
    start: 0x1000
    vram: 0x80100400
    bss_size: 0
    subsegments:
      - [0x1000, asm]

  - [0x1000000]   # end of ROM (16 MiB)
